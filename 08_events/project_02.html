<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Events</title>
</head>

<body style="background-color:#212121;color:#fff;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;">

    <div id="insert" style="font-size:1.5rem;text-align:center;">
        Press any key...
    </div>

</body>

<script>

    // =====================================================
    // Keyboard Event Listener
    // =====================================================
    // Fires whenever a key is pressed.

    window.addEventListener('keydown', function (e) {

        document.querySelector('#insert').innerHTML = `
            <table border="1" cellpadding="10" style="border-collapse:collapse;">
                <tr>
                    <th>Key</th>
                    <th>KeyCode</th>
                    <th>Code</th>
                </tr>
                <tr>
                    <td>${e.key === ' ' ? 'Space' : e.key}</td>
                    <td>${e.keyCode}</td>
                    <td>${e.code}</td>
                </tr>
            </table>
        `;

    });

</script>
</html>
